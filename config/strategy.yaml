production_strategy_id: "trend_momentum"

strategy:
  name: "etf_momentum_v1"
  version: "1.0.0"
  rebalance_frequency: "monthly"  # monthly, biweekly
  hold_count: 1

  trade_policy:
    rebalance_frequency: "monthly"
    execution_delay_trading_days: 1
    lot_size: 100
    fee_rate: 0.001

  # 动量评分配置
  score_formula:
    return_20_weight: 0.5
    return_60_weight: 0.5

  # 趋势过滤配置
  # 注意：当前生产候选策略（trend_momentum）在 enabled=true 时仅支持 ma_period=120 且 ma_type=sma。
  trend_filter:
    enabled: true
    ma_period: 120
    ma_type: "sma"

  # 防御模式配置
  defensive_mode:
    enabled: false
    defensive_etf: null  # 例如: "511880" (银华日利)

  governance:
    enabled: true
    manual_approval_required: true
    champion_min_appearances: 3
    challenger_min_top1: 2
    challenger_min_score_margin: 0.05
    champion_max_drawdown_penalty: 0.12
    fallback_strategy_id: "trend_momentum"
    automation:
      enabled: true
      require_fresh_summary: true
      max_summary_age_days: 7
      min_reports_required: 3
      min_days_between_switches: 20
      block_on_open_incident: true
      risk_breach_streak: 2
      regime_gate:
        enabled: true
        min_appearances: 2
        min_avg_observation_count: 20

  # 空仓配置
  allow_cash: true
